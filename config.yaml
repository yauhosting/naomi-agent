# NAOMI Agent Configuration
agent:
  name: "NAOMI"
  version: "0.5.1"
  description: "Autonomous AI Agent - Digital Life Form"

brain:
  # Smart routing with multi-tier fallback:
  #   Chat:  Codex GPT-5.4 → MiniMax M2.7 → Ollama → GLM → Claude CLI
  #   Code:  Claude CLI → Codex GPT-5.4 → MiniMax M2.7 → GLM 5.1 → Ollama OmniCoder
  primary:
    type: "claude_proxy"
    model: "claude-sonnet-4-6"
    cli_model: "opus"
    proxy_url: "http://127.0.0.1:18790/v1/chat/completions"
    timeout: 180
  fallback:
    type: "minimax"
    api_key: ""  # via MINIMAX_API_KEY env
    model: "MiniMax-M2.7"
    base_url: "https://api.minimax.io/anthropic/v1"

heartbeat:
  interval: 30          # seconds between heartbeats
  idle_threshold: 300   # seconds before entering creative mode
  self_check_interval: 3600  # hourly self-check

memory:
  db_path: "data/naomi_memory.db"
  max_short_term: 50    # max short-term memory entries
  consolidation_interval: 3600  # hourly memory consolidation

senses:
  file_watch_dirs:
    - "/Users/yokowai/Projects/"
  system_check_interval: 60
  web_scan_interval: 3600

dashboard:
  host: "127.0.0.1"     # Localhost only — use SSH tunnel for remote access
  port: 18802

git:
  auto_commit: true
  auto_push: true
  remote: "origin"
  branch: "main"

logging:
  level: "INFO"
  file: "data/naomi.log"
  max_size: "10MB"

computer:
  screenshot_dir: "/tmp/naomi_screenshots"
  max_steps: 15            # max vision-action loop steps
  cleanup_keep: 20         # keep latest N screenshots

tts:
  backend: "kokoro"            # "kokoro" | "qwen3" | "edge" | "auto"
  kokoro:
    model: "mlx-community/Kokoro-82M-bf16"
    voice: "zf_xiaobei"        # Chinese female preset
    speed: 1.0
    lang_code: "z"             # z=Chinese, a=American EN, j=Japanese
  qwen3:
    model: "mlx-community/Qwen3-TTS-12Hz-0.6B-CustomVoice-bf16"
    speaker: "Vivian"          # Vivian, Serena, Ryan, Aiden, etc.
    instruct: ""               # emotion/style e.g. "Very happy and excited."
    ref_audio: ""              # path to .wav for voice cloning (Base models only)
    ref_text: ""               # transcript of ref_audio
  edge:
    voice: "zh-TW-HsiaoChenNeural"

telegram:
  enabled: true
  # Set TELEGRAM_MASTER_ID in .env for the authorized user ID.
  master_id: 0

whatsapp:
  enabled: true
  # Set WHATSAPP_MASTER_NUMBER in .env, without chat suffixes.
  master_number: ""
  bridge_url: "http://127.0.0.1:18804"
  webhook_port: 18803
