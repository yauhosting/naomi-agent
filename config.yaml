# NAOMI Agent Configuration
agent:
  name: "NAOMI"
  version: "0.4.0"
  description: "Autonomous AI Agent - Digital Life Form"

brain:
  # Primary: Claude CLI via proxy (OpenClaw style) — uses Max subscription
  primary:
    type: "claude_proxy"
    model: "claude-sonnet-4-6"     # Sonnet for daily tasks (fast + capable)
    proxy_url: "http://127.0.0.1:18790/v1/chat/completions"
    timeout: 120
  # Fallback: MiniMax 2.7 API
  fallback:
    type: "minimax"
    api_key: ""  # Set via environment variable MINIMAX_API_KEY
    model: "MiniMax-M2.7"
    base_url: "https://api.minimax.io/anthropic/v1"

heartbeat:
  interval: 30          # seconds between heartbeats
  idle_threshold: 300   # seconds before entering creative mode
  self_check_interval: 3600  # hourly self-check

memory:
  db_path: "data/naomi_memory.db"
  max_short_term: 50    # max short-term memory entries
  consolidation_interval: 3600  # hourly memory consolidation

senses:
  file_watch_dirs:
    - "/Users/yokowai/Projects/"
  system_check_interval: 60
  web_scan_interval: 3600

dashboard:
  host: "0.0.0.0"
  port: 18802

git:
  auto_commit: true
  auto_push: true
  remote: "origin"
  branch: "main"

logging:
  level: "INFO"
  file: "data/naomi.log"
  max_size: "10MB"

computer:
  screenshot_dir: "/tmp/naomi_screenshots"
  max_steps: 15            # max vision-action loop steps
  cleanup_keep: 20         # keep latest N screenshots

telegram:
  enabled: true
  master_id: 5197390147
